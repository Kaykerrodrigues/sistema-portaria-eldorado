<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portaria Eldorado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
    Sistema de Portaria - Condomínio Eldorado
</header>

<div class="container">

    <h1>Painel de Controle</h1>
    <div style="text-align: center; margin-right: 20px; word-spacing: 5px; ">
        <button>Cadastrar</button>
        <button>Registrar Entrada</button>
        <button>Editar</button>
        <button>Remover</button>
        <button>Historico</button>
        <button>Relatorio</button>
    </div>
    <h2>Lista de Pessoas</h2>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Documento</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
